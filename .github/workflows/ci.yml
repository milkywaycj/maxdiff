name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR / branch when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-hb.txt

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright browser (Chromium)
        # tests/e2e/ drives Chromium via pytest-playwright. The pip
        # package installs the plugin but not the browser; the browser
        # is downloaded on demand by `playwright install`. Without it
        # the e2e fixtures error out at fixture-setup time and every
        # CI job fails.
        run: |
          python -m playwright install --with-deps chromium

      - name: Install optional HB dependencies (Linux only)
        # JAX wheels on Windows are only published as CPU-only for some
        # Python versions and the install is slow. Run HB tests on
        # Linux only; HB code paths are platform-independent Python.
        if: matrix.os == 'ubuntu-latest'
        run: pip install -r requirements-hb.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Run tests with coverage
        env:
          # Force matplotlib into headless mode so it does not try to
          # open a Tk display on CI runners (would hang on Linux).
          MPLBACKEND: Agg
        run: |
          pytest --cov --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
