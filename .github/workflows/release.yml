name: Release

# Phase 7 release workflow.
#
# Two trigger modes:
#   1. Tag push matching v*.*.* (e.g. v3.0.0)         -> full release: build
#      artifacts AND publish a GitHub Release with them attached.
#   2. Manual workflow_dispatch (optional `tag` input) -> dry-run: build
#      artifacts and upload them as workflow artifacts ONLY. No GitHub
#      Release is created. Use this to test workflow changes without
#      cutting a real release.
#
# Source of truth for the version is src/maxdiff/_version.py. Bump that
# file (and CHANGELOG.md) before tagging. See docs/RELEASE.md.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Label for dry-run artifacts (no Release is created)"
        required: false
        default: "preview"

# Mirrors ci.yml: cancel superseded runs for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # needed by softprops/action-gh-release on tag pushes

jobs:
  build-python:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-hb.txt

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Install built wheel and import-test
        env:
          MPLBACKEND: Agg
        run: |
          pip install dist/*.whl
          python -c "import maxdiff; from maxdiff import _version; print('maxdiff', _version.__version__)"

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  build-windows-exe:
    name: Build Windows EXE (with HB)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-hb.txt

      - name: Install runtime, dev, HB, and PyInstaller dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt -r requirements-hb.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        # Mirrors pyinstaller/build_instructions.md (HB variant). Keep
        # these flags in sync with that doc.
        env:
          MPLBACKEND: Agg
        run: |
          python -m PyInstaller --onefile --noconsole --clean `
            --hidden-import=openpyxl `
            --hidden-import=matplotlib.backends.backend_pdf `
            --hidden-import=matplotlib.backends.backend_agg `
            --hidden-import=matplotlib.backends.backend_tkagg `
            --hidden-import=jax `
            --hidden-import=jaxlib `
            --hidden-import=numpyro `
            --collect-submodules=matplotlib.backends `
            --collect-submodules=matplotlib `
            --collect-all=customtkinter `
            src/MaxDiff_Data_Analyzer_v2-1.py

      - name: Smoke-test EXE artifact
        # The GUI has no --help / --version flag and starts Tk's mainloop
        # immediately, so we cannot actually launch it in CI without
        # hanging. Instead verify the binary was produced and is a
        # plausible size (> 10 MB; a real build is hundreds of MB).
        shell: pwsh
        run: |
          $exe = "dist\MaxDiff_Data_Analyzer_v2-1.exe"
          if (-not (Test-Path $exe)) { throw "EXE not found at $exe" }
          $size = (Get-Item $exe).Length
          Write-Host "EXE size: $size bytes"
          if ($size -lt 10MB) { throw "EXE suspiciously small: $size bytes" }

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/MaxDiff_Data_Analyzer_v2-1.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-python, build-windows-exe]
    # Only publish a Release for real tag pushes. workflow_dispatch runs
    # stop here, leaving the per-job artifacts for inspection.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/python

      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/windows

      - name: Rename EXE to include version
        # The wheel and sdist already encode the version (PEP 427). The
        # EXE filename is constant by default, so we rename it before
        # attaching to the Release so users can identify the version
        # from the filename alone.
        run: |
          mv dist/windows/MaxDiff_Data_Analyzer_v2-1.exe \
             "dist/windows/MaxDiff_Data_Analyzer_${GITHUB_REF_NAME}.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/python/*
            dist/windows/*.exe

      # ----------------------------------------------------------------
      # OPTIONAL: PyPI publishing. Disabled until the maintainer decides
      # to publish to PyPI. To enable:
      #   1. Create a PyPI API token scoped to the `maxdiff` project
      #      (or set up Trusted Publishing via OIDC).
      #   2. Add it as repo secret PYPI_API_TOKEN.
      #   3. Uncomment the step below.
      # ----------------------------------------------------------------
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     packages-dir: dist/python
      #     password: ${{ secrets.PYPI_API_TOKEN }}
